function srsMode(level) {
  return level <= 1 ? 0 : level === 2 ? 1 : level === 3 ? 2 : level === 4 ? 3 : 4;
}
function isDue(card) {
  return !card.nextReview || Date.now() >= card.nextReview;
}
function getDueCards(cards) {
  return cards.filter(isDue).sort((a, b) => (a.nextReview || 0) - (b.nextReview || 0));
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick(arr, exclude, field, n = 3) {
  return shuffle(arr.filter(x => x.w !== exclude)).slice(0, n).map(x => x[field]);
}

/* ===================== TTS ===================== */
function speak(text, rate = 0.85) {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = rate;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith("en"));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}
